name: Alerta Webshare (proxy do WhatsApp)

# Checa diariamente a banda/pagamento do proxy Webshare — ponto único de falha
# de todas as instâncias Evolution. A rota /api/alerts/webshare-cron decide
# internamente se dispara alerta (banda alta, assinatura pausada/throttled, ou
# lembrete no dia 1) e evita reenviar o mesmo alerta todo dia.

on:
  schedule:
    # Todo dia às 08h BRT (11h UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Disparar checagem do Webshare
        run: |
          echo "Checando Webshare em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          URL="${{ secrets.WEBSHARE_ALERT_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::Secret WEBSHARE_ALERT_URL não configurado no repositório."
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET "$URL")
          echo "HTTP $HTTP_CODE"
          echo "=== Resposta ==="
          cat /tmp/response.json 2>/dev/null && echo "" || echo "(vazio)"
          echo "================"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::webshare-cron retornou HTTP $HTTP_CODE"
            exit 1
          fi
