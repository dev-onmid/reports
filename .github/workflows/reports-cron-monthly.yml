name: Relatórios Automáticos Mensais

# Dispara diariamente a checagem de relatórios automáticos.
# A rota /api/reports/cron-monthly filtra internamente pelos clientes cujo
# `send_day` (dia do mês configurado) é hoje — por isso precisa rodar TODO dia,
# não só no dia 1 (o cron do Vercel Hobby só permite 1x/dia por job e não dava
# conta de clientes com send_day diferente de 1).

on:
  schedule:
    # Todo dia às 08h BRT (11h UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow" no GitHub

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Disparar checagem de relatórios automáticos
        run: |
          echo "Disparando cron-monthly em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          URL="${{ secrets.REPORTS_CRON_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::Secret REPORTS_CRON_URL não configurado no repositório."
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET "$URL")
          echo "HTTP $HTTP_CODE"
          echo "=== Resposta ==="
          cat /tmp/response.json 2>/dev/null && echo "" || echo "(vazio)"
          echo "================"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::cron-monthly retornou HTTP $HTTP_CODE"
            exit 1
          fi
