name: Leadlovers Worker

# Dispara o worker do Leadlovers a cada 5 minutos durante o horário comercial BR.
# Cron independente do cron-job.org (que está reservado para outra finalidade).
# O worker busca contatos com next_send_at <= NOW() e envia para o webhook do Leadlovers.

on:
  schedule:
    # A cada 5 min, das 11h às 23h UTC (08h às 20h BRT), de segunda a sexta.
    - cron: '*/5 11-23 * * 1-5'
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow" no GitHub

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar worker do Leadlovers
        run: |
          echo "Disparando worker em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "${{ secrets.LEADLOVERS_WORKER_URL }}")
          echo "HTTP $HTTP_CODE"
          echo "=== Resposta ==="
          cat /tmp/resp.json 2>/dev/null && echo "" || echo "(vazio)"
          echo "================"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Worker retornou HTTP $HTTP_CODE"
            exit 1
          fi
